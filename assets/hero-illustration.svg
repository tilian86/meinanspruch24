<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="heroBg" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#1b5e7b"/>
      <stop offset="55%" stop-color="#00465f"/>
      <stop offset="100%" stop-color="#001e2c"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#6ffbbe" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6ffbbe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlow2" cx="0.15" cy="0.9" r="0.5">
      <stop offset="0%" stop-color="#93ceef" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#93ceef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pathGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4edea3"/>
      <stop offset="100%" stop-color="#6ffbbe"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="500" height="500" rx="40" fill="url(#heroBg)"/>
  <rect width="500" height="500" rx="40" fill="url(#heroGlow)"/>
  <rect width="500" height="500" rx="40" fill="url(#heroGlow2)"/>

  <!-- Horizontallinien (Architektur-Grid) -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Abfallende Kurve (Ablehnung) -->
  <path d="M 50 200 Q 150 210 220 270 T 400 390" stroke="#ba1a1a" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="4 8" fill="none"/>

  <!-- Aufsteigende Hauptkurve (Durchsetzung) -->
  <path d="M 50 420 Q 180 400 250 300 T 450 90" stroke="url(#pathGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Datenpunkte auf aufsteigender Linie -->
  <g fill="#6ffbbe">
    <circle cx="50" cy="420" r="7"/>
    <circle cx="170" cy="380" r="7"/>
    <circle cx="260" cy="290" r="7"/>
    <circle cx="360" cy="180" r="7"/>
    <circle cx="450" cy="90" r="9" stroke="#ffffff" stroke-width="3"/>
  </g>

  <!-- "Geld"-Symbol am Ziel -->
  <g transform="translate(415 55)">
    <circle cx="0" cy="0" r="32" fill="#004b31" stroke="#6ffbbe" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="800" font-size="28" fill="#6ffbbe">€</text>
  </g>

  <!-- Mini-Labels -->
  <g font-family="Manrope, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.9">
    <text x="60" y="450">Ablehnung</text>
    <text x="230" y="280" fill-opacity="0.7">Widerspruch</text>
    <text x="310" y="160" fill-opacity="0.7">Verhandlung</text>
  </g>

  <!-- Oben links Headline-Block -->
  <g transform="translate(40 50)">
    <rect x="0" y="0" width="200" height="92" rx="16" fill="#ffffff" fill-opacity="0.08"/>
    <text x="20" y="32" font-family="Manrope, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#6ffbbe">FALLVERLAUF</text>
    <text x="20" y="62" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="24" font-weight="800" fill="#ffffff">+14.600 €</text>
    <text x="20" y="82" font-family="Manrope, system-ui, sans-serif" font-size="12" font-weight="500" fill="#ffffff" fill-opacity="0.75">durchgesetzte BU-Rente/Jahr</text>
  </g>

</svg>
